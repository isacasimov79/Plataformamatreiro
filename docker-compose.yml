# Docker Compose for Plataforma Matreiro SaaS - Full Stack
# Services: Postgres, Django, Nginx, Phishing-Web, Redis, Celery

services:
  postgres:
    image: postgres:15-alpine
    container_name: matreiro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-matreiro_db}
      POSTGRES_USER: ${DB_USER:-matreiro_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-matreiro_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-matreiro_user} -d ${DB_NAME:-matreiro_db}"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matreiro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matreiro_django
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput 2>/dev/null;
             gunicorn matreiro.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 300 --keep-alive 60 --log-level info --access-logfile - --error-logfile -"
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DB_ENGINE=${DB_ENGINE}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DATABASE_URL=postgresql://${DB_USER:-matreiro_user}:${DB_PASSWORD:-matreiro_password}@postgres:${DB_PORT:-5432}/${DB_NAME:-matreiro_db}
      - KEYCLOAK_URL=https://iam.upn.com.br/auth
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-underprotection}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-Matreiro}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matreiro_celery
    restart: unless-stopped
    command: celery -A matreiro worker -l info --concurrency=2
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=${DB_ENGINE}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DATABASE_URL=postgresql://${DB_USER:-matreiro_user}:${DB_PASSWORD:-matreiro_password}@postgres:${DB_PORT:-5432}/${DB_NAME:-matreiro_db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matreiro_celery_beat
    restart: unless-stopped
    command: celery -A matreiro beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=${DB_ENGINE}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DATABASE_URL=postgresql://${DB_USER:-matreiro_user}:${DB_PASSWORD:-matreiro_password}@postgres:${DB_PORT:-5432}/${DB_NAME:-matreiro_db}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  phishing_web:
    build:
      context: ./phishing-web
      dockerfile: Dockerfile
    container_name: matreiro_phishing
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-matreiro_user}:${DB_PASSWORD:-matreiro_password}@postgres:${DB_PORT:-5432}/${DB_NAME:-matreiro_db}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: matreiro_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - django
      - phishing_web
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  default:
    name: plataformamatreirosaas_network
    driver: bridge
