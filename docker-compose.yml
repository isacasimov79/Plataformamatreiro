# Docker Compose for Plataformamatreirosaas - Optimized Light Version
# Without Redis, Celery, Flower (use remote Keycloak at iam.upn.com.br)
# Redis/Celery preserved in code for future use

services:
  postgres:
    image: postgres:15-alpine
    container_name: matreiro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-matreiro_db}
      POSTGRES_USER: ${DB_USER:-matreiro_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-matreiro_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-matreiro_user} -d ${DB_NAME:-matreiro_db}"]
      interval: 30s
      timeout: 10s
      retries: 5

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matreiro_django
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             gunicorn matreiro.wsgi:application --bind 0.0.0.0:8000 --workers 1 --threads 2 --timeout 300 --keep-alive 60 --log-level info --access-logfile - --error-logfile -"
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DB_ENGINE=${DB_ENGINE}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - KEYCLOAK_URL=https://iam.upn.com.br/auth
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-matreiro}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-matreiro-client}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: matreiro_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  default:
    name: plataformamatreirosaas_network
    driver: bridge
