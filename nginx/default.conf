# ==============================================
# Plataforma Matreiro - Nginx Configuration
# ==============================================

# Redirect HTTP to HTTPS (produção)
# server {
#     listen 80;
#     server_name matreiro.com.br www.matreiro.com.br;
#     return 301 https://$server_name$request_uri;
# }

# Main server block
server {
    listen 80;
    server_name localhost;
    
    # SSL configuration (descomentar em produção)
    # listen 443 ssl http2;
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    client_max_body_size 50M;
    
    # Logging
    access_log /var/log/nginx/matreiro_access.log;
    error_log /var/log/nginx/matreiro_error.log;

    # ==============================================
    # Django API
    # ==============================================
    location /api/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        # CORS headers (se necessário)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        
        # Handle OPTIONS requests
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ==============================================
    # Django Admin
    # ==============================================
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Rate limiting mais restritivo
        limit_req zone=login_limit burst=5 nodelay;
    }

    # ==============================================
    # Django Static Files
    # ==============================================
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==============================================
    # Django Media Files (uploads)
    # ==============================================
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ==============================================
    # Health Check
    # ==============================================
    location /health {
        proxy_pass http://django_backend/api/health;
        access_log off;
    }

    # ==============================================
    # Frontend (React) - Opcional
    # Se servir frontend pelo Nginx
    # ==============================================
    # location / {
    #     root /usr/share/nginx/html;
    #     try_files $uri $uri/ /index.html;
    #     expires 1h;
    #     add_header Cache-Control "public";
    # }

    # ==============================================
    # Deny access to hidden files
    # ==============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
